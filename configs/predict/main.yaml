# Rolling prediction config consumed by `scripts/predict.py`.
# This workflow reads a feature CSV plus the frozen training manifest and writes
# one forecast row per asset and forecast date.
# Frozen manifest produced by `scripts/train.py`.
manifest_path: "artifacts/demo/training_manifest.json"
dataset:
  # Prediction / backtest feature CSV produced by `scripts/extract_features.py`.
  csv_path: "data/predict_features.csv"
  # Column containing the calendar date for each row.
  date_column: "date"
  # Column identifying the asset / panel member.
  id_column: "asset_id"
# Output CSV path for rolling model predictions.
output_csv: "artifacts/demo/predictions.csv"
# Torch device used for inference.
device: "cpu"
