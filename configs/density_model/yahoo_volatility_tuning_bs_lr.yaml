# Yahoo volatility — batch_size × learning_rate grid tuning.
#
# Grid:
#   training.batch_size   ∈ {32, 64, 128, 256}       (4 options)
#   training.learning_rate ∈ {5e-5, 1e-4, 3e-4, 1e-3} (4 options)
# => 16 trials × 3 expanding-window folds × 5 epochs per fold = 240 epoch-runs.
# Median pruner enabled so obvious losers get killed after warmup.
#
# Writes best_params.yaml + best_config.yaml + trials.csv to
# <artifacts.output_dir>/studies/<study_name>/. The emitted best_config.yaml
# is a drop-in for scripts/preprocess.py + scripts/train.py.

data:
  train_csv: "data/train_features.csv"
  val_csv: "data/val_features.csv"
  date_column: "date"
  id_column: "asset_id"

features:
  sequence_length: 21
  forecast_horizon: 1
  target_column: "return"
  continuous_columns: ["return"]
  dynamic_categorical_columns: []
  static_categorical_columns: ["ticker"]

model:
  name: "causal_cross_asset_transformer"
  params:
    d_model: 64
    dim_feedforward: 256
    num_heads: 4
    num_layers: 2
    dropout: 0.10
    fusion_mode: "concat"
    out_steps: 21
    target_dim: 1
    sigma_min: 0.000001

training:
  # batch_size + learning_rate are overridden per-trial by the search space.
  batch_size: 64
  learning_rate: 0.0001
  max_epochs: 1     # ignored by tuning; each fold uses tuning.epochs_per_fold
  random_seed: 42
  device: "cuda"
  weight_decay: 0.0
  shuffle: true
  grad_clip: 1.0
  verbose: 2

early_stopping:
  enabled: false
  monitor: "val_loss"
  mode: "min"
  patience: 2            # short patience — each fold runs only epochs_per_fold (5) epochs
  min_delta: 0.0
  warmup: 0
  restore_best_weights: true
  verbose: false         # keep false or fold logs get noisy across 16×3 fold runs


model_checkpoint:
  enabled: false

artifacts:
  output_dir: "outputs/density_model_yahoo_v1"

logging:
  level: "INFO"
  format: "text"
  include_timestamps: true

tuning:
  study_name: "yahoo_vol_bs_lr_v1"
  direction: "minimize"
  metric: "val_loss"
  sampler: "grid"
  epochs_per_fold: 30
  pruner:
    enabled: true
    type: "median"
    n_warmup_steps: 1     # allow 1 epoch before pruning can kick in
    n_startup_trials: 3   # complete 3 trials before pruning references
  splitter:
    type: "expanding_window"
    n_splits: 3
  search_space:
    training.batch_size: [32, 64, 128, 256]
    training.learning_rate: [0.00005, 0.0001, 0.0003, 0.001]
