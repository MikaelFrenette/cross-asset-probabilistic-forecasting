# Ensemble inference for yahoo_volatility_ensemble_real.yaml.
manifest_path: "outputs/density_model_yahoo_ensemble_real/ensemble/ensemble_manifest.json"

data:
  csv_path: "data/predict_features.csv"
  date_column: "date"
  id_column: "asset_id"

output_csv: "outputs/density_model_yahoo_ensemble_real/predictions.csv"
device: "cuda"
batch_size: 256

logging:
  level: "INFO"
  format: "text"
  include_timestamps: true
