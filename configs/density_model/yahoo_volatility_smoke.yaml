# Yahoo volatility — SMOKE-TEST training config.
# Identical to yahoo_volatility.yaml but trains for a single epoch so we can
# verify the end-to-end train + manifest-write path without waiting for a real
# training run.

data:
  train_csv: "../data/train_features.csv"
  val_csv: "../data/val_features.csv"
  date_column: "date"
  id_column: "asset_id"

features:
  sequence_length: 60
  forecast_horizon: 1
  target_column: "return"
  continuous_columns: ["return"]
  dynamic_categorical_columns: []
  static_categorical_columns: ["ticker"]

model:
  name: "causal_cross_asset_transformer"
  params:
    d_model: 32
    dim_feedforward: 64
    num_heads: 4
    num_layers: 2
    dropout: 0.10
    fusion_mode: "concat"
    out_steps: 1
    target_dim: 1
    sigma_min: 0.000001

training:
  batch_size: 64
  learning_rate: 0.0001
  max_epochs: 1
  random_seed: 42
  device: "cuda"
  weight_decay: 0.0
  shuffle: true
  grad_clip: 1.0
  verbose: 1

early_stopping:
  enabled: false

model_checkpoint:
  enabled: false

artifacts:
  output_dir: "../outputs/density_model_yahoo_v1"
  preprocessing_filename: "preprocessing.json"
  model_state_filename: "model.pt"
  manifest_filename: "training_manifest.json"
  predictions_filename: "predictions.csv"

logging:
  level: "INFO"
  format: "text"
  include_timestamps: true
