# GARCH benchmark config consumed by `scripts/fit_garch.py` and `scripts/predict_garch.py`.
# The benchmark rescales returns internally by 100 for ARCH optimizer stability,
# then converts `mu` and `sigma` back to the original return units on output.
dataset:
  # Training feature CSV used to fit the benchmark parameters.
  csv_path: "data/train_features.csv"
  # Column containing the calendar date for each row.
  date_column: "date"
  # Column identifying the asset / panel member.
  id_column: "asset_id"

# Supervised target column modeled by the GARCH benchmark.
target_column: "return"

spec:
  # Mean model passed to `arch.arch_model`.
  mean: "AR"
  # Mean-model lag order used when `mean: "AR"`.
  lags: 1
  # Volatility model identifier passed to `arch.arch_model`.
  vol: "GARCH"
  # Autoregressive lag order of the variance equation.
  p: 1
  # Moving-average lag order of the variance equation.
  q: 1
  # Innovation distribution identifier passed to `arch.arch_model`.
  dist: "normal"

artifacts:
  # Directory where fitted benchmark artifacts and predictions are written.
  output_dir: "artifacts/demo/garch"
  # Serialized fitted benchmark artifact filename.
  model_filename: "garch_benchmark.json"
  # Rolling benchmark prediction CSV filename.
  predictions_filename: "garch_predictions.csv"
