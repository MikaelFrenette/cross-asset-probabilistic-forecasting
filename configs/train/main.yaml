# CSV-based training config for the public volatility-model workflow.
dataset:
  # Training feature CSV produced by `scripts/extract_features.py`.
  train_csv: "data/train_features.csv"
  # Validation feature CSV produced by `scripts/extract_features.py`.
  validation_csv: "data/val_features.csv"
  # Shared column containing the calendar date for each row.
  date_column: "date"
  # Shared column identifying the asset / panel member.
  id_column: "asset_id"

features:
  # Number of past daily observations provided to the model.
  sequence_length: 60
  # Forecast horizon in daily steps. `1` means next-session prediction.
  forecast_horizon: 1
  # Supervised target column predicted by the model and scored by the likelihood.
  target_column: "return"
  streams:
    # Continuous feature stream passed into `X_continuous`.
    continuous:
      - returns
    # Dynamic categorical stream passed into `X_cat_continuous`. `null` means none.
    dynamic_categoricals:
      - null
    # Static categorical stream passed into `X_cat_static`.
    static_categoricals:
      - ticker

model:
  # Public model identifier selected by the model factory.
  name: cross_attention_volatility
  # Shared transformer width used for stream encoders, temporal attention, and heads.
  model_dim: 64
  # Feed-forward width used inside each transformer block.
  ff_dim: 256
  # Number of attention heads in the temporal and cross-asset blocks.
  num_heads: 4
  # Number of stacked temporal transformer layers.
  num_layers: 2
  # Dropout rate used throughout the model.
  dropout: 0.10
  # Strategy used to fuse active input streams before temporal encoding.
  fusion_mode: concat
  # Small positive floor added to sigma after softplus for likelihood stability.
  likelihood_eps: 0.000001

training:
  # Number of forecast samples per optimizer step.
  batch_size: 64
  # Optimizer learning rate.
  learning_rate: 0.0001
  # Maximum number of full passes over the training split.
  max_epochs: 50
  # Random seed used for reproducible initialization and data-order decisions.
  random_seed: 42
  # L2-style weight decay applied by the optimizer.
  weight_decay: 0.0
  # Whether to shuffle training samples each epoch.
  shuffle: true
  # Optional gradient clipping threshold. `null` disables clipping.
  grad_clip: null
  # Trainer verbosity. `2` enables the live progress bar.
  verbose: 2
  # Torch device used for model training.
  device: "cuda:0"

early_stopping:
  # Whether early stopping is enabled during training.
  enabled: true
  # Metric monitored by the early stopping callback.
  monitor: "val_loss"
  # Direction of improvement for the monitored metric.
  mode: "min"
  # Number of epochs without improvement before stopping.
  patience: 10
  # Minimum improvement required to reset patience.
  min_delta: 0.0
  # Number of initial epochs ignored by early stopping.
  warmup: 0
  # Whether to restore the best model weights before exiting training.
  restore_best_weights: true
  # Whether the callback should print status messages.
  verbose: false

model_checkpoint:
  # Whether best-model checkpointing is enabled during training.
  enabled: true
  # Metric monitored by the checkpoint callback.
  monitor: "val_loss"
  # Direction of improvement for the monitored metric.
  mode: "min"
  # Minimum improvement required before saving a new checkpoint.
  min_delta: 0.0
  # Number of initial epochs ignored by checkpointing.
  warmup: 0
  # Whether optimizer state is stored alongside model weights.
  save_optimizer: true
  # Whether new best checkpoints overwrite the previous one.
  overwrite: true
  # Whether the callback should print checkpoint save messages.
  verbose: true

artifacts:
  # Directory where training writes all saved artifacts.
  output_dir: "artifacts/demo"
  # Saved preprocessing bundle filename.
  preprocessing_filename: "preprocessing.json"
  # Saved PyTorch state-dict filename.
  model_state_filename: "model.pt"
  # Frozen manifest filename consumed by prediction and plotting.
  manifest_filename: "training_manifest.json"
  # Default prediction CSV filename written under the artifact directory.
  predictions_filename: "predictions.csv"
